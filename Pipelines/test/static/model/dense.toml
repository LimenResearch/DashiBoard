name = "basic"
seed = 1234

[components]

model = [
    { name = "dense", features = { "-v" = "features" }, sigma = "relu" },
    { name = "dense" },
]

[loss]
name = "mse"
agg = "mean"

[[metrics]]
name = "mae"
agg = "mean"

[[widgets]]
key = "features"
widget = "input"
label = "Features"
placeholder = "Select number of features"
type = "number"
min = 1
step = 1
value = 5

[[properties]]
key = "features"
title = "Features"
description = "Number of features"
type = "integer"
minimum = 1
