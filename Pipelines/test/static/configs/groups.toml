[[nodes]]
label = "rescale"
[nodes.card]
type = "rescale"
method = {"name" = "zscore"}
group_by = {cols = ["cbwd"]}
partition = {nodes = ["partition"]}
inputs = [
    {groups = ["weather"]},
    {cols = ["No"]}
]

[[nodes]]
label = "log"
[nodes.card]
type = "rescale"
method = {"name" = "log"}
suffix = "log"
inputs = {cols = ["No"]}

[[nodes]]
label = "pca"
[nodes.card]
type = "dimensionality_reduction"
method = {"name" = "pca"}
n_components = 2
inputs = [
    {nodes = ["log"]},
    {groups = ["weather"], through = ["rescale"]}
]

[[nodes]]
label = "partition"
[nodes.card]
type = "split"
method = {"name" = "percentile", percentile = 0.9}
output = "partition"
order_by = {cols = ["No"]}

[groups]
weather = {cols = ["PRES", "TEMP"]}
